<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Remote WebView</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:-apple-system,sans-serif;color:#fff}
#status{position:fixed;top:0;left:0;right:0;z-index:10;padding:6px 12px;background:rgba(0,0,0,.75);font-size:12px;display:flex;justify-content:space-between}
canvas{display:block;position:fixed;top:0;left:0;touch-action:none}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="status">
  <span id="stState">未连接</span>
  <span id="stFps">FPS: --</span>
</div>

<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const stState = document.getElementById('stState');
  const stFps = document.getElementById('stFps');

  let ws = null;
  let reconnectTimer = null;
  let shouldReconnect = false;
  let frameCount = 0;
  let lastFpsTime = performance.now();

  // --- Canvas sizing ---
  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // --- FPS counter ---
  setInterval(function() {
    const now = performance.now();
    const dt = (now - lastFpsTime) / 1000;
    stFps.textContent = 'FPS: ' + (dt > 0 ? (frameCount / dt).toFixed(1) : '--');
    frameCount = 0;
    lastFpsTime = now;
  }, 1000);

  // 固定打开的页面（美团经营宝登录），不支持用户修改
  const FIXED_TARGET_URL = 'https://epassport.meituan.com/portal/login?bg_source=1&service=com.sankuai.meishi.fe.ecom&part_type=0&feconfig=bssoify&biz_line=1&continue=https%3A%2F%2Fecom.meituan.com%2Fbizaccount%2Fbiz-choice.html%3Fredirect_uri%3Dhttps%253A%252F%252Fe.dianping.com%252Fapp%252Fmerchant-platform%252Ffe6031ae4f544c4%253FiUrl%253DLy9lLmRpYW5waW5nLmNvbS9hcHAvbWVyY2hhbnQtd29ya2JlbmNoL2luZGV4Lmh0bWwjLw%26_t%3D1767340831854%26target%3Dhttps%253A%252F%252Fe.dianping.com%252Fapp%252Fmerchant-platform%252Ffe6031ae4f544c4%253FiUrl%253DLy9lLmRpYW5waW5nLmNvbS9hcHAvbWVyY2hhbnQtd29ya2JlbmNoL2luZGV4Lmh0bWwjLw&leftBottomLink=&signUpTarget=self';

  // --- Protocol constants ---
  const FRAME_HEADER = 11;
  const TILE_HEADER = 12;
  const MSG_FRAME = 1;
  const MSG_TOUCH = 2;
  const MSG_OPENURL = 4;
  const MSG_KEY = 6;
  const TOUCH_DOWN = 1, TOUCH_MOVE = 2, TOUCH_UP = 3;
  const KEY_DOWN = 0, KEY_UP = 1;
  const FLAG_LAST_OF_FRAME = 1;

  // 帧组装 & 序号保序状态
  let pendingFrameId = -1;
  let pendingTiles = [];       // 当前帧累积的 tile 数据 {x,y,w,h,jpeg}
  let lastRenderedFrameId = -1; // 上一次绘制成功的帧 ID（用于丢弃乱序帧）

  // --- Parse and render frame ---
  // 支持：① 多包帧组装（同一 frameId 分多条消息）② 乱序帧丢弃（旧帧解码完成后不覆盖新帧）
  function handleBinaryMessage(data) {
    const dv = new DataView(data);
    if (dv.getUint8(0) !== MSG_FRAME) return;

    const frameId = dv.getUint32(2, true);   // bytes 2-5
    const tileCount = dv.getUint16(7, true); // bytes 7-8
    const flags = dv.getUint16(9, true);     // bytes 9-10

    // 新帧到来时重置累积器（丢弃上一帧未完成的残包）
    if (frameId !== pendingFrameId) {
      pendingFrameId = frameId;
      pendingTiles = [];
    }

    // 从当前消息中提取 tile 原始数据（拷贝以防 ArrayBuffer 被回收）
    let offset = FRAME_HEADER;
    for (let i = 0; i < tileCount; i++) {
      if (offset + TILE_HEADER > data.byteLength) break;
      const x = dv.getUint16(offset,     true);
      const y = dv.getUint16(offset + 2, true);
      const w = dv.getUint16(offset + 4, true);
      const h = dv.getUint16(offset + 6, true);
      const dlen = dv.getUint32(offset + 8, true);
      offset += TILE_HEADER;
      if (offset + dlen > data.byteLength) break;
      pendingTiles.push({ x, y, w, h, jpeg: data.slice(offset, offset + dlen) });
      offset += dlen;
    }

    // 收到本帧最后一个包才解码并绘制
    if (!(flags & FLAG_LAST_OF_FRAME)) return;

    const tilesToRender = pendingTiles;
    const capturedFrameId = frameId;
    pendingTiles = [];
    pendingFrameId = -1;

    // 同帧所有 tile 并行解码，全部就绪后原子绘制
    Promise.all(tilesToRender.map(function(t) {
      const blob = new Blob([t.jpeg], { type: 'image/jpeg' });
      return createImageBitmap(blob).then(function(bmp) {
        return { bmp, x: t.x, y: t.y, w: t.w, h: t.h };
      });
    })).then(function(tiles) {
      // 序号检查：丢弃已过时的帧（处理环绕溢出：差值超过一半时认为反向）
      const diff = (capturedFrameId - lastRenderedFrameId) & 0xFFFFFFFF;
      if (lastRenderedFrameId !== -1 && diff > 0x7FFFFFFF) {
        tiles.forEach(function(t) { t.bmp.close(); });
        return;
      }
      lastRenderedFrameId = capturedFrameId;
      tiles.forEach(function(t) {
        ctx.drawImage(t.bmp, t.x, t.y, t.w, t.h);
        t.bmp.close();
      });
      frameCount++;
    }).catch(function() {});
  }

  // --- Build touch packet (12 bytes, 含客户端真实时间戳) ---
  // 格式: [type u8][ver u8][kind u8][id u8][x u16][y u16][ts_lo u32]
  // ts_lo = Date.now() & 0xffffffff，服务端用于还原 CDP event.timeStamp
  function buildTouchPacket(kind, pointerId, x, y) {
    const buf = new ArrayBuffer(12);
    const dv = new DataView(buf);
    dv.setUint8(0, MSG_TOUCH);
    dv.setUint8(1, 1);
    dv.setUint8(2, kind);
    dv.setUint8(3, pointerId & 0xff);
    dv.setUint16(4, Math.max(0, Math.min(0xffff, Math.round(x))), true);
    dv.setUint16(6, Math.max(0, Math.min(0xffff, Math.round(y))), true);
    dv.setUint32(8, Date.now() >>> 0, true); // 低 32 位时间戳
    return buf;
  }

  // --- Build OpenURL packet ---
  function buildOpenURLPacket(url) {
    const urlBytes = new TextEncoder().encode(url);
    const buf = new ArrayBuffer(8 + urlBytes.length);
    const dv = new DataView(buf);
    dv.setUint8(0, MSG_OPENURL);
    dv.setUint8(1, 1); // version
    dv.setUint16(2, 0, true); // flags
    dv.setUint32(4, urlBytes.length, true);
    new Uint8Array(buf, 8).set(urlBytes);
    return buf;
  }

  // --- Build key packet: [type=6 u8][ver=1 u8][action u8][key_len u16LE][key utf8] ---
  function buildKeyPacket(action, key) {
    var keyBytes = new TextEncoder().encode(key);
    var buf = new ArrayBuffer(5 + keyBytes.length);
    var dv = new DataView(buf);
    dv.setUint8(0, MSG_KEY);
    dv.setUint8(1, 1);
    dv.setUint8(2, action);
    dv.setUint16(3, keyBytes.length, true);
    new Uint8Array(buf, 5).set(keyBytes);
    return buf;
  }

  // --- Keyboard events ---
  document.addEventListener('keydown', function(e) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    // Don't capture when typing in input fields
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    e.preventDefault();
    ws.send(buildKeyPacket(KEY_DOWN, e.key));
  });
  document.addEventListener('keyup', function(e) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    e.preventDefault();
    ws.send(buildKeyPacket(KEY_UP, e.key));
  });

  // --- Touch / Mouse input ---
  // 每个事件立即发送（无 rAF 节流），服务端并发处理 MOVE、等待最后 MOVE 完成后才发 UP
  function send(pkt) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(pkt);
  }

  function touchHandler(e) {
    e.preventDefault();
    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    switch (e.type) {
      case 'touchstart':
        for (var i = 0; i < e.changedTouches.length; i++) {
          var t = e.changedTouches[i];
          send(buildTouchPacket(TOUCH_DOWN, t.identifier, t.clientX, t.clientY));
        }
        break;
      case 'touchmove':
        // 使用 getCoalescedEvents() 获取帧间全部采样点（支持时则用）
        var src = (e.getCoalescedEvents ? e.getCoalescedEvents() : null) || [e];
        for (var i = 0; i < src.length; i++) {
          var ev = src[i];
          var touches = ev.touches || e.touches;
          for (var j = 0; j < touches.length; j++) {
            var t = touches[j];
            send(buildTouchPacket(TOUCH_MOVE, t.identifier, t.clientX, t.clientY));
          }
        }
        break;
      case 'touchend':
      case 'touchcancel':
        for (var i = 0; i < e.changedTouches.length; i++) {
          var t = e.changedTouches[i];
          send(buildTouchPacket(TOUCH_UP, t.identifier, t.clientX, t.clientY));
        }
        break;
    }
  }

  canvas.addEventListener('touchstart',  touchHandler, { passive: false });
  canvas.addEventListener('touchmove',   touchHandler, { passive: false });
  canvas.addEventListener('touchend',    touchHandler, { passive: false });
  canvas.addEventListener('touchcancel', touchHandler, { passive: false });

  // Mouse（桌面端）
  var mouseDown = false;
  canvas.addEventListener('mousedown', function(e) {
    mouseDown = true;
    send(buildTouchPacket(TOUCH_DOWN, 0, e.clientX, e.clientY));
  });
  canvas.addEventListener('mousemove', function(e) {
    if (!mouseDown) return;
    send(buildTouchPacket(TOUCH_MOVE, 0, e.clientX, e.clientY));
  });
  canvas.addEventListener('mouseup', function(e) {
    mouseDown = false;
    send(buildTouchPacket(TOUCH_UP, 0, e.clientX, e.clientY));
  });

  // --- Connection ---
  function getWsUrl() {
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    var wsAddr = proto + '//' + location.hostname + ':8081';
    var w = window.innerWidth;
    var h = window.innerHeight;
    var params = '?id=h5&w=' + w + '&h=' + h + '&q=80&mbpm=131072&mfi=0';
    return wsAddr + params;
  }

  function connect() {
    if (ws) return;
    var targetUrl = FIXED_TARGET_URL;
    var wsUrl = getWsUrl();
    shouldReconnect = true;

    stState.textContent = '连接中...';
    ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';

    ws.onopen = function() {
      stState.textContent = '已连接';
      // Send OpenURL packet to navigate the remote browser to fixed page
      if (targetUrl) {
        var urlToSend = targetUrl;
        if (!/^https?:\/\//i.test(urlToSend)) urlToSend = 'https://' + urlToSend;
        ws.send(buildOpenURLPacket(urlToSend));
      }
    };

    ws.onmessage = function(e) {
      if (e.data instanceof ArrayBuffer) {
        handleBinaryMessage(e.data);
      }
    };

    ws.onclose = function() {
      ws = null;
      stState.textContent = '已断开';
      if (shouldReconnect) {
        stState.textContent = '重连中...';
        reconnectTimer = setTimeout(connect, 2000);
      }
    };

    ws.onerror = function() {
      stState.textContent = '连接错误';
    };
  }

  // 进入页面后自动连接并打开默认链接
  connect();
})();
</script>
</body>
</html>
